<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Real-Life FPS">
  <title>Real-Life FPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <video id="webcam" autoplay playsinline muted webkit-playsinline></video>

  <!-- Canvas stack -->
  <canvas id="webcam-canvas"></canvas>
  <canvas id="game-canvas"></canvas>
  <canvas id="hud-canvas"></canvas>

  <!-- HUD buttons (hidden until game starts) -->
  <button id="cog-btn"        class="hidden" title="Settings">⚙</button>
  <button id="restart-btn"   class="hidden" title="Restart">↺</button>
  <button id="fullscreen-btn" class="hidden" title="Fullscreen">
    <!-- enter-fullscreen icon -->
    <svg class="fs-enter" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    <!-- exit-fullscreen icon -->
    <svg class="fs-exit" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="8 3 8 8 3 8"/><polyline points="16 21 16 16 21 16"/>
      <line x1="3" y1="8" x2="10" y2="15"/><line x1="21" y1="16" x2="14" y2="9"/>
    </svg>
  </button>
  <button id="barrel-tip"  class="hidden" title="Shoot"></button>

  <!-- iOS "Add to Home Screen" tip -->
  <div id="ios-tip" class="hidden">
    <p>For fullscreen, add this page to your Home Screen:</p>
    <p>Tap <strong>Share</strong> <span class="ios-share-icon">⎙</span> → <strong>Add to Home Screen</strong></p>
    <button id="ios-tip-close">GOT IT</button>
  </div>

  <!-- Config panel -->
  <div id="config-panel" class="hidden"></div>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="start-box">
      <h1 class="start-title">REAL-LIFE FPS</h1>
      <p class="start-sub">Point your camera at a person and shoot</p>
      <p class="start-hint">Click / hold · Shift+S to shoot · Shift+R to reload</p>
      <button id="start-btn">▶ ALLOW CAMERA &amp; START</button>
      <p id="start-error" class="start-error hidden"></p>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen" class="hidden">
    <p class="loading-title">LOADING AI MODEL</p>
    <p id="loading-status" class="loading-sub">Initializing…</p>
    <p id="loading-error"  class="start-error hidden"></p>
    <button id="loading-retry" class="hidden">↺ TRY AGAIN</button>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
